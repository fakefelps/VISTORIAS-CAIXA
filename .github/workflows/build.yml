name: Gerar EXE - BERCAN Projetos v3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: |
          pip install python-docx openpyxl pywin32 pillow lxml pyinstaller pytesseract pymupdf

      - name: Baixar e configurar Tesseract OCR
        run: |
          # Baixar instalador Tesseract
          curl -L -o tesseract-installer.exe "https://github.com/UB-Mannheim/tesseract/releases/download/v5.3.3.20231005/tesseract-ocr-w64-setup-5.3.3.20231005.exe"
          # Instalar silenciosamente
          Start-Process -FilePath "tesseract-installer.exe" -ArgumentList "/S", "/D=C:\Tesseract" -Wait
          # Copiar para pasta assets/tesseract para embutir no exe
          New-Item -ItemType Directory -Force -Path "assets\tesseract\tessdata"
          Copy-Item "C:\Tesseract\tesseract.exe" "assets\tesseract\tesseract.exe"
          Copy-Item "C:\Tesseract\*.dll" "assets\tesseract\"
          Copy-Item "C:\Tesseract\tessdata\por.traineddata" "assets\tesseract\tessdata\por.traineddata"
          Copy-Item "C:\Tesseract\tessdata\eng.traineddata" "assets\tesseract\tessdata\eng.traineddata"
          echo "Tesseract configurado."
        shell: powershell

      - name: Gerar EXE
        run: |
          python -m PyInstaller --onefile --windowed `
            --name "BercanProjetos" `
            --icon "icone.ico" `
            --add-data "assets;assets" `
            --hidden-import win32com.client `
            --hidden-import win32com.server.util `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pywintypes `
            --hidden-import PIL._imaging `
            --hidden-import PIL.Image `
            --hidden-import docx `
            --hidden-import docx.oxml `
            --hidden-import docx.oxml.ns `
            --hidden-import openpyxl `
            --hidden-import openpyxl.styles `
            --hidden-import openpyxl.drawing.image `
            --hidden-import pytesseract `
            --hidden-import fitz `
            --collect-all win32com `
            --collect-all docx `
            --collect-all openpyxl `
            --collect-all lxml `
            app.py

      - uses: actions/upload-artifact@v4
        with:
          name: BercanProjetos-Windows
          path: dist/BercanProjetos.exe
          retention-days: 30
