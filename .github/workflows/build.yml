name: Gerar EXE - BERCAN Projetos v3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: pip install python-docx openpyxl pywin32 pillow lxml pyinstaller pytesseract pymupdf

      - name: Instalar Tesseract via Chocolatey
        shell: powershell
        run: |
          choco install tesseract --yes --no-progress
          $tessDir = "C:\Program Files\Tesseract-OCR"
          New-Item -ItemType Directory -Force -Path "assets\tesseract\tessdata" | Out-Null
          Copy-Item "$tessDir\tesseract.exe" "assets\tesseract\tesseract.exe"
          Get-ChildItem "$tessDir\*.dll" | Copy-Item -Destination "assets\tesseract\"
          # Baixar traineddata português via pip (tessdata)
          python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/tesseract-ocr/tessdata/raw/main/por.traineddata', 'assets/tesseract/tessdata/por.traineddata')"
          python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/tesseract-ocr/tessdata/raw/main/eng.traineddata', 'assets/tesseract/tessdata/eng.traineddata')"
          Write-Host "Tesseract OK"

      - name: Gerar EXE
        run: |
          python -m PyInstaller --onefile --windowed `
            --name "BercanProjetos" `
            --icon "icone.ico" `
            --add-data "assets;assets" `
            --hidden-import win32com.client `
            --hidden-import win32com.server.util `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pywintypes `
            --hidden-import PIL._imaging `
            --hidden-import PIL.Image `
            --hidden-import docx `
            --hidden-import docx.oxml `
            --hidden-import docx.oxml.ns `
            --hidden-import openpyxl `
            --hidden-import openpyxl.styles `
            --hidden-import openpyxl.drawing.image `
            --hidden-import pytesseract `
            --hidden-import fitz `
            --collect-all win32com `
            --collect-all docx `
            --collect-all openpyxl `
            --collect-all lxml `
            app.py

      - uses: actions/upload-artifact@v4
        with:
          name: BercanProjetos-Windows
          path: dist/BercanProjetos.exe
          retention-days: 30
