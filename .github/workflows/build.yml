name: Gerar EXE - PreencherDocumentos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install python-docx openpyxl pywin32 pillow lxml pyinstaller

      - name: Gerar EXE
        run: |
          python -m PyInstaller --onefile --windowed `
            --name "PreencherDocumentos" `
            --icon "icone.ico" `
            --hidden-import win32com.client `
            --hidden-import win32com.server.util `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pywintypes `
            --hidden-import PIL._imaging `
            --hidden-import PIL.Image `
            --hidden-import docx `
            --hidden-import docx.oxml `
            --hidden-import docx.oxml.ns `
            --hidden-import openpyxl `
            --hidden-import openpyxl.styles `
            --hidden-import openpyxl.drawing.image `
            --collect-all win32com `
            --collect-all docx `
            --collect-all openpyxl `
            --collect-all lxml `
            app.py

      - uses: actions/upload-artifact@v4
        with:
          name: PreencherDocumentos-Windows
          path: dist/PreencherDocumentos.exe
          retention-days: 30
