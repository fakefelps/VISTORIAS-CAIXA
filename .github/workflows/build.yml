name: Gerar EXE - PreencherDocumentos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install python-docx openpyxl comtypes pillow lxml pyinstaller

      - name: Gerar EXE
        run: |
          python -m PyInstaller --onefile --windowed `
            --name "PreencherDocumentos" `
            --icon "icone.ico" `
            --hidden-import comtypes.server.inprocserver `
            --hidden-import comtypes.client `
            --hidden-import PIL._imaging `
            --hidden-import PIL.Image `
            --collect-all lxml `
            app.py

      - uses: actions/upload-artifact@v4
        with:
          name: PreencherDocumentos-Windows
          path: dist/PreencherDocumentos.exe
          retention-days: 30
