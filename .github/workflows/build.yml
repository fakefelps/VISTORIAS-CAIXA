name: Gerar EXE - BERCAN Projetos v4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # OBRIGATÓRIO — 3.12+ quebra PyInstaller no Windows

      - name: Instalar dependências Python
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install python-docx==1.1.0 openpyxl==3.1.2 pywin32==306 pillow==10.2.0 lxml==5.1.0 pytesseract==0.3.10 pymupdf==1.23.26 pyinstaller==6.3.0

      # ========================================================
      # INSTALAR TESSERACT (simplificado e robusto)
      # ========================================================
      - name: Instalar Tesseract via Chocolatey
        shell: cmd
        run: choco install tesseract --yes --no-progress

      - name: Criar pastas para empacotar Tesseract
        shell: cmd
        run: |
          mkdir assets\tesseract 2>nul
          mkdir assets\tesseract\tessdata 2>nul

      - name: Copiar Tesseract para assets
        shell: cmd
        run: |
          copy "C:\Program Files\Tesseract-OCR\tesseract.exe" "assets\tesseract\tesseract.exe"
          copy "C:\Program Files\Tesseract-OCR\*.dll" "assets\tesseract\"

      - name: Baixar idiomas do Tesseract
        shell: cmd
        run: |
          curl -L -o "assets\tesseract\tessdata\por.traineddata" "https://github.com/tesseract-ocr/tessdata/raw/main/por.traineddata"
          curl -L -o "assets\tesseract\tessdata\eng.traineddata" "https://github.com/tesseract-ocr/tessdata/raw/main/eng.traineddata"
          curl -L -o "assets\tesseract\tessdata\osd.traineddata" "https://github.com/tesseract-ocr/tessdata/raw/main/osd.traineddata"

      - name: Verificar Tesseract empacotado
        shell: cmd
        run: |
          dir assets\tesseract
          dir assets\tesseract\tessdata
          "assets\tesseract\tesseract.exe" --version

      # ========================================================
      # GERAR EXE
      # ========================================================
      - name: Gerar EXE com PyInstaller
        shell: cmd
        run: |
          python -m PyInstaller --onefile --windowed ^
            --name "BercanProjetos" ^
            --icon "icone.ico" ^
            --add-data "assets;assets" ^
            --hidden-import win32com.client ^
            --hidden-import win32com.server.util ^
            --hidden-import win32api ^
            --hidden-import win32con ^
            --hidden-import pywintypes ^
            --hidden-import pythoncom ^
            --hidden-import PIL._imaging ^
            --hidden-import PIL.Image ^
            --hidden-import PIL.ImageFilter ^
            --hidden-import PIL.ImageOps ^
            --hidden-import docx ^
            --hidden-import docx.oxml ^
            --hidden-import docx.oxml.ns ^
            --hidden-import openpyxl ^
            --hidden-import openpyxl.styles ^
            --hidden-import openpyxl.drawing.image ^
            --hidden-import pytesseract ^
            --hidden-import fitz ^
            --hidden-import lxml.etree ^
            --collect-all win32com ^
            --collect-all docx ^
            --collect-all openpyxl ^
            --collect-all lxml ^
            --collect-all pytesseract ^
            --collect-all fitz ^
            app.py

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: BercanProjetos-v4-Windows
          path: dist/BercanProjetos.exe
          retention-days: 30
